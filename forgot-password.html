<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Forgot Password | Z Black Innovation & Tech</title>
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;600;700&display=swap" rel="stylesheet">
    <style>
        body,
        html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            font-family: 'Space Grotesk', system-ui, -apple-system, sans-serif;
            overflow: hidden;
            background-color: #000;
        }

        #starCanvas,
        #lightCanvas {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 1;
        }

        .forgot-wrapper {
            position: relative;
            z-index: 10;
            display: flex;
            justify-content: center;
            align-items: center;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.4);
            backdrop-filter: blur(10px);
        }

        .forgot-card {
            background: rgba(255, 255, 255, 0.08);
            backdrop-filter: blur(25px);
            -webkit-backdrop-filter: blur(25px);
            border: 1px solid rgba(255, 255, 255, 0.2);
            border-radius: 30px;
            padding: 50px 40px;
            width: 100%;
            max-width: 400px;
            text-align: center;
            color: white;
            box-shadow: 0 25px 50px rgba(0, 0, 0, 0.5);
            transition: transform 0.3s ease;
        }

        h1 {
            font-size: 2rem;
            margin-bottom: 20px;
            font-weight: 700;
            letter-spacing: -1px;
            background: linear-gradient(90deg, #f64f59, #c471ed, #12c2e9);
            -webkit-background-clip: text;
            background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        p {
            font-size: 0.95rem;
            margin-bottom: 30px;
            opacity: 0.8;
            line-height: 1.5;
        }

        .form-group {
            margin-bottom: 25px;
            text-align: left;
        }

        label {
            display: block;
            font-size: 0.9rem;
            font-weight: 600;
            margin-bottom: 8px;
            opacity: 0.8;
            padding-left: 5px;
        }

        input {
            width: 100%;
            padding: 14px 20px;
            border-radius: 15px;
            border: 1px solid rgba(255, 255, 255, 0.2);
            background: rgba(255, 255, 255, 0.05);
            color: white;
            font-family: inherit;
            font-size: 1rem;
            box-sizing: border-box;
            transition: all 0.3s ease;
        }

        input:focus {
            outline: none;
            border-color: #f64f59;
            background: rgba(255, 255, 255, 0.1);
            box-shadow: 0 0 15px rgba(246, 79, 89, 0.3);
        }

        .reset-btn {
            width: 100%;
            padding: 16px;
            border: none;
            border-radius: 15px;
            background: linear-gradient(90deg, #f64f59, #c471ed);
            color: white;
            font-weight: 700;
            font-size: 1.1rem;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .reset-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 20px rgba(246, 79, 89, 0.4);
            filter: brightness(1.1);
        }

        .back-link {
            margin-top: 25px;
            font-size: 0.9rem;
            opacity: 0.8;
        }

        .back-link a {
            color: white;
            text-decoration: none;
            font-weight: 600;
            border-bottom: 1px solid transparent;
            transition: all 0.3s ease;
        }

        .back-link a:hover {
            border-bottom-color: white;
            opacity: 1;
        }

        /* Light Mode */
        body.light-mode { background-color: #f0f4f8; }
        body.light-mode .forgot-wrapper { background: rgba(255, 255, 255, 0.3); }
        body.light-mode .forgot-card { background: rgba(255, 255, 255, 0.85); color: #333; border-color: rgba(0, 0, 0, 0.1); }
        body.light-mode input { background: #fff; color: #333; border-color: #ddd; }
        body.light-mode label { color: #555; opacity: 1; }
        body.light-mode .back-link a { color: #333; }
        body.light-mode .back-link a:hover { border-bottom-color: #333; }

        /* Theme Toggle styles */
        .theme-toggle {
            position: fixed;
            top: 25px;
            right: 25px;
            z-index: 1000;
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.2);
            width: 50px;
            height: 50px;
            border-radius: 50%;
            display: flex;
            justify-content: center;
            align-items: center;
            cursor: pointer;
            transition: all 0.3s ease;
        }
    </style>

    <!-- Theme Setup (Runs before page render to prevent flash) -->
    <script>
        (function() {
            var savedTheme = localStorage.getItem("theme");
            // Default to light mode if not explicitly dark
            if (savedTheme !== "dark") {
                document.body.classList.add("light-mode");
                localStorage.setItem("theme", "light"); // ensure it is set for cross-page sync
            }
        })();
    </script>
</head>

<body>
    <div class="theme-toggle" id="themeToggle">
        <svg id="themeIcon" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2"
            stroke-linecap="round" stroke-linejoin="round">
            <path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"></path>
        </svg>
    </div>

    <canvas id="starCanvas"></canvas>
    <canvas id="lightCanvas"></canvas>

    <div class="forgot-wrapper">
        <div class="forgot-card">
            <h1>Reset Password</h1>
            <p>Enter your email address and we'll send you a link to reset your password.</p>
            <form id="forgotForm">
                <div class="form-group">
                    <label for="email">Email Address</label>
                    <input type="email" id="email" placeholder="name@company.com" required>
                </div>
                <button type="submit" class="reset-btn">Send Reset Link</button>
            </form>
            <div class="back-link">
                <a href="login.html">← Back to Login</a>
            </div>
        </div>
    </div>

    <script>
        const body = document.body;
        const toggleBtn = document.getElementById('themeToggle');
        const themeIcon = document.getElementById('themeIcon');
        const starCanvas = document.getElementById('starCanvas');
        const lightCanvas = document.getElementById('lightCanvas');

        function applyTheme(isLight) {
            if (isLight) {
                body.classList.add('light-mode');
                themeIcon.innerHTML = '<circle cx="12" cy="12" r="5"></circle><line x1="12" y1="1" x2="12" y2="3"></line><line x1="12" y1="21" x2="12" y2="23"></line><line x1="4.22" y1="4.22" x2="5.64" y2="5.64"></line><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"></line><line x1="1" y1="12" x2="3" y2="12"></line><line x1="21" y1="12" x2="23" y2="12"></line><line x1="4.22" y1="19.78" x2="5.64" y2="18.36"></line><line x1="18.36" y1="5.64" x2="19.78" y2="4.22"></line>';
                themeIcon.setAttribute('stroke', '#333');
                toggleBtn.style.background = 'rgba(0,0,0,0.05)';
                starCanvas.style.opacity = '0';
                lightCanvas.style.opacity = '1';
                localStorage.setItem('theme', 'light');
            } else {
                body.classList.remove('light-mode');
                themeIcon.innerHTML = '<path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"></path>';
                themeIcon.setAttribute('stroke', 'white');
                toggleBtn.style.background = 'rgba(255,255,255,0.1)';
                starCanvas.style.opacity = '1';
                lightCanvas.style.opacity = '0';
                localStorage.setItem('theme', 'dark');
            }
        }

        toggleBtn.addEventListener('click', () => applyTheme(!body.classList.contains('light-mode')));
        applyTheme(localStorage.getItem('theme') === 'light');

        const ctx = starCanvas.getContext('2d');
        const STAR_COUNT = 220;
        let stars = [];

        function resizeCanvas() {
            starCanvas.width = window.innerWidth;
            starCanvas.height = window.innerHeight;
            lightCanvas.width = window.innerWidth;
            lightCanvas.height = window.innerHeight;
            initStars();
            initBokeh();
        }

        function randomBetween(a, b) { return a + Math.random() * (b - a); }
        function initStars() {
            stars = [];
            for (let i = 0; i < STAR_COUNT; i++) {
                stars.push({
                    x: randomBetween(0, starCanvas.width), y: randomBetween(0, starCanvas.height),
                    radius: randomBetween(0.4, 1.8), alpha: randomBetween(0.2, 1),
                    delta: randomBetween(0.003, 0.018) * (Math.random() < 0.5 ? 1 : -1),
                    color: Math.random() < 0.15 ? '#c2e9ff' : (Math.random() < 0.1 ? '#ffd1a9' : '#ffffff')
                });
            }
        }

        const MOON_R = 70;
        let moonX, moonY;
        function drawMoon() {
            const t = Date.now() / 1000;
            const angle = (t / 30) * Math.PI * 2;
            const cx = starCanvas.width * 0.5, cy = starCanvas.height * 0.5;
            moonX = cx + Math.cos(angle) * starCanvas.width * 0.44;
            moonY = cy + Math.sin(angle) * starCanvas.height * 0.40;
            const outerGlow = ctx.createRadialGradient(moonX, moonY, MOON_R * 0.7, moonX, moonY, MOON_R * 2.2);
            outerGlow.addColorStop(0, 'rgba(240,240,180,0.18)'); outerGlow.addColorStop(1, 'rgba(0,0,0,0)');
            ctx.beginPath(); ctx.arc(moonX, moonY, MOON_R * 2.2, 0, Math.PI * 2); ctx.fillStyle = outerGlow; ctx.fill();
            const moonGrad = ctx.createRadialGradient(moonX - MOON_R * 0.3, moonY - MOON_R * 0.3, MOON_R * 0.05, moonX, moonY, MOON_R);
            moonGrad.addColorStop(0, '#f5f0d8'); moonGrad.addColorStop(1, '#807860');
            ctx.beginPath(); ctx.arc(moonX, moonY, MOON_R, 0, Math.PI * 2); ctx.fillStyle = moonGrad; ctx.fill();
        }

        function drawStars() {
            ctx.clearRect(0, 0, starCanvas.width, starCanvas.height);
            drawMoon();
            stars.forEach(s => {
                s.alpha += s.delta;
                if (s.alpha >= 1) s.alpha = 1, s.delta *= -1;
                if (s.alpha <= 0.1) s.alpha = 0.1, s.delta *= -1;
                ctx.beginPath(); ctx.arc(s.x, s.y, s.radius, 0, Math.PI * 2);
                ctx.fillStyle = `rgba(255,255,255,${s.alpha})`; ctx.fill();
            });
            requestAnimationFrame(drawStars);
        }

        const lctx = lightCanvas.getContext('2d');
        let bokeh = [];
        function initBokeh() {
            bokeh = [];
            for (let i = 0; i < 35; i++) {
                bokeh.push({
                    x: Math.random() * lctx.canvas.width, y: Math.random() * lctx.canvas.height, r: 20 + Math.random() * 80,
                    vx: (Math.random() - 0.5) * 0.2, vy: (Math.random() - 0.5) * 0.2, alpha: 0.1, color: '196, 113, 237'
                });
            }
        }
        function drawBokeh() {
            lctx.clearRect(0, 0, lctx.canvas.width, lctx.canvas.height);
            bokeh.forEach(b => {
                b.x += b.vx; b.y += b.vy;
                const g = lctx.createRadialGradient(b.x, b.y, 0, b.x, b.y, b.r);
                g.addColorStop(0, `rgba(${b.color}, ${b.alpha})`); g.addColorStop(1, 'transparent');
                lctx.beginPath(); lctx.arc(b.x, b.y, b.r, 0, Math.PI * 2); lctx.fillStyle = g; lctx.fill();
            });
            requestAnimationFrame(drawBokeh);
        }

        window.addEventListener('resize', resizeCanvas);
        resizeCanvas(); drawStars(); drawBokeh();
    </script>
</body>

</html>
