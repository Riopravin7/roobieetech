<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Set New Password | Roobiee Tech</title>
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;600;700&display=swap" rel="stylesheet">
    <style>
        body,
        html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            font-family: 'Space Grotesk', system-ui, -apple-system, sans-serif;
            overflow: hidden;
            background-color: #000;
        }

        #starCanvas,
        #lightCanvas {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 1;
        }

        .reset-wrapper {
            position: relative;
            z-index: 10;
            display: flex;
            justify-content: center;
            align-items: center;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.4);
            backdrop-filter: blur(10px);
        }

        .reset-card {
            background: rgba(255, 255, 255, 0.08);
            backdrop-filter: blur(25px);
            -webkit-backdrop-filter: blur(25px);
            border: 1px solid rgba(255, 255, 255, 0.2);
            border-radius: 30px;
            padding: 50px 40px;
            width: 100%;
            max-width: 400px;
            text-align: center;
            color: white;
            box-shadow: 0 25px 50px rgba(0, 0, 0, 0.5);
        }

        h1 {
            font-size: 2rem;
            margin-bottom: 20px;
            font-weight: 700;
            background: linear-gradient(90deg, #12c2e9, #c471ed, #f64f59);
            -webkit-background-clip: text;
            background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .form-group {
            margin-bottom: 20px;
            text-align: left;
        }

        label {
            display: block;
            font-size: 0.9rem;
            margin-bottom: 8px;
            opacity: 0.8;
            padding-left: 5px;
        }

        input {
            width: 100%;
            padding: 14px 20px;
            border-radius: 15px;
            border: 1px solid rgba(255, 255, 255, 0.2);
            background: rgba(255, 255, 255, 0.05);
            color: white;
            font-family: inherit;
            box-sizing: border-box;
        }

        input:focus {
            outline: none;
            border-color: #12c2e9;
            box-shadow: 0 0 15px rgba(18, 194, 233, 0.3);
        }

        .save-btn {
            width: 100%;
            padding: 16px;
            border: none;
            border-radius: 15px;
            background: linear-gradient(90deg, #12c2e9, #c471ed);
            color: white;
            font-weight: 700;
            font-size: 1.1rem;
            cursor: pointer;
            margin-top: 10px;
        }

        .error-msg { color: #ff4d4d; font-size: 0.8rem; margin-top: 5px; display: none; }

        /* Light Mode */
        body.light-mode { background-color: #f0f4f8; }
        body.light-mode .reset-wrapper { background: rgba(255, 255, 255, 0.3); }
        body.light-mode .reset-card { background: rgba(255, 255, 255, 0.85); color: #333; border-color: rgba(0, 0, 0, 0.1); }
        body.light-mode input { background: #fff; color: #333; border-color: #ddd; }
        body.light-mode label { color: #555; }

        .theme-toggle {
            position: fixed;
            top: 25px; right: 25px; z-index: 1000;
            background: rgba(255, 255, 255, 0.1); backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.2); width: 50px; height: 50px;
            border-radius: 50%; display: flex; justify-content: center; align-items: center; cursor: pointer;
        }
    </style>

    <!-- Theme Setup (Runs before page render to prevent flash) -->
    <script>
        (function() {
            var savedTheme = localStorage.getItem("theme");
            // Default to light mode if not explicitly dark
            if (savedTheme !== "dark") {
                document.body.classList.add("light-mode");
                localStorage.setItem("theme", "light"); // ensure it is set for cross-page sync
            }
        })();
    </script>
</head>

<body>
    <div class="theme-toggle" id="themeToggle">
        <svg id="themeIcon" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2"
            stroke-linecap="round" stroke-linejoin="round">
            <path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"></path>
        </svg>
    </div>

    <canvas id="starCanvas"></canvas>
    <canvas id="lightCanvas"></canvas>

    <div class="reset-wrapper">
        <div class="reset-card">
            <h1>New Password</h1>
            <p style="font-size: 0.9rem; opacity: 0.7; margin-bottom: 25px;">Please enter a secure new password for your account.</p>
            <form id="resetForm">
                <div class="form-group">
                    <label for="password">New Password</label>
                    <input type="password" id="password" placeholder="••••••••" required minlength="8">
                </div>
                <div class="form-group">
                    <label for="confirm">Confirm Password</label>
                    <input type="password" id="confirm" placeholder="••••••••" required>
                    <div id="error" class="error-msg">Passwords do not match.</div>
                </div>
                <button type="submit" class="apply-btn">Reset Password</button>
            </form>
            <div class="back-link">
                <a href="login.html">← Back to Login</a>
            </div>
        </div>
    </div>

    <!-- Supabase SDK -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
    <script src="supabase-config.js"></script>

    <script>
        const body = document.body;
        const toggleBtn = document.getElementById('themeToggle');
        const themeIcon = document.getElementById('themeIcon');
        const starCanvas = document.getElementById('starCanvas');
        const lightCanvas = document.getElementById('lightCanvas');

        function applyTheme(isLight) {
            if (isLight) {
                body.classList.add('light-mode');
                themeIcon.innerHTML = '<circle cx="12" cy="12" r="5"></circle><line x1="12" y1="1" x2="12" y2="3"></line><line x1="12" y1="21" x2="12" y2="23"></line><line x1="4.22" y1="4.22" x2="5.64" y2="5.64"></line><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"></line><line x1="1" y1="12" x2="3" y2="12"></line><line x1="21" y1="12" x2="23" y2="12"></line><line x1="4.22" y1="19.78" x2="5.64" y2="18.36"></line><line x1="18.36" y1="5.64" x2="19.78" y2="4.22"></line>';
                themeIcon.setAttribute('stroke', '#333');
                toggleBtn.style.background = 'rgba(0,0,0,0.05)';
                starCanvas.style.opacity = '0';
                lightCanvas.style.opacity = '1';
                localStorage.setItem('theme', 'light');
            } else {
                body.classList.remove('light-mode');
                themeIcon.innerHTML = '<path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"></path>';
                themeIcon.setAttribute('stroke', 'white');
                toggleBtn.style.background = 'rgba(255,255,255,0.1)';
                starCanvas.style.opacity = '1';
                lightCanvas.style.opacity = '0';
                localStorage.setItem('theme', 'dark');
            }
        }

        toggleBtn.addEventListener('click', () => applyTheme(!body.classList.contains('light-mode')));
        applyTheme(localStorage.getItem('theme') === 'light');

        // Moon Animation Logic
        const ctx = starCanvas.getContext('2d');
        const STAR_COUNT = 220;
        let stars = [];

        function resizeCanvas() {
            starCanvas.width = window.innerWidth;
            starCanvas.height = window.innerHeight;
            lightCanvas.width = window.innerWidth;
            lightCanvas.height = window.innerHeight;
            initStars();
        }
        function initStars() {
            stars = [];
            for (let i = 0; i < STAR_COUNT; i++) {
                stars.push({ x: Math.random() * starCanvas.width, y: Math.random() * starCanvas.height, radius: 1, alpha: Math.random(), delta: 0.01 });
            }
        }
        function drawStars() {
            ctx.clearRect(0, 0, starCanvas.width, starCanvas.height);
            stars.forEach(s => {
                s.alpha += s.delta; if (s.alpha > 1 || s.alpha < 0.1) s.delta *= -1;
                ctx.beginPath(); ctx.arc(s.x, s.y, s.radius, 0, Math.PI * 2);
                ctx.fillStyle = `rgba(255,255,255,${s.alpha})`; ctx.fill();
            });
            requestAnimationFrame(drawStars);
        }
        resizeCanvas(); drawStars();

        // ======= SUPABASE PASSWORD RESET LOGIC =======
        // Supabase sends a link that includes an access_token in the URL hash.
        // When the user lands on this page, we exchange it and update the password.
        document.getElementById('resetForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const p = document.getElementById('password').value;
            const c = document.getElementById('confirm').value;
            if (p !== c) {
                document.getElementById('error').style.display = 'block';
                return;
            }
            document.getElementById('error').style.display = 'none';

            try {
                // updateUser works when the user has an active session from the reset link
                const { data, error } = await supabaseClient.auth.updateUser({ password: p });
                if (error) throw error;
                alert('Password updated successfully! You can now log in.');
                window.location.href = 'login.html';
            } catch (error) {
                alert(error.message);
            }
        });
    </script>
</body>

</html>
